spring:
  application:
    name: ai-agent
  ai:
    mcp:
      client:
        sse:
          connections:
            server1:
              url: http://localhost:8127
    #        stdio:
    #          servers-configuration: classpath:mcp-server.json
    dashscope:
      api-key: 
      chat:
        options:
          model: qwen-plus
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        max-document-batch-size: 10000
  datasource:
    url: jdbc:mysql://localhost:3306/sqltest?serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&useSSL=false
    username: 
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
